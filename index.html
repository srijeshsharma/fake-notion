<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fake Notion</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] },
          colors: {
            notion: {
              bg: '#ffffff',
              'bg-dark': '#191919',
              sidebar: '#f7f7f5',
              'sidebar-dark': '#202020',
              'sidebar-hover': '#ebebea',
              'sidebar-hover-dark': '#2f2f2f',
              border: '#e8e8e5',
              'border-dark': '#2f2f2f',
              text: '#37352f',
              'text-dark': '#e8e8e3',
              muted: '#9b9a97',
              accent: '#2eaadc',
            }
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    * { scrollbar-width: thin; scrollbar-color: #d1d1d1 transparent; }
    *::-webkit-scrollbar { width: 6px; height: 6px; }
    *::-webkit-scrollbar-thumb { background: #d1d1d1; border-radius: 3px; }
    .dark *::-webkit-scrollbar-thumb { background: #444; }
    [data-dragging="true"] { opacity: 0.4; cursor: grabbing; }
    .column-drop-active { background: rgba(46,170,220,0.04); }
    .slash-menu { animation: slideUp 0.12s ease; }
    @keyframes slideUp { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: translateY(0); } }
    .modal-enter { animation: modalIn 0.15s ease; }
    @keyframes modalIn { from { opacity:0; transform: scale(0.97); } to { opacity:1; transform: scale(1); } }
    .sidebar-transition { transition: width 0.2s ease, opacity 0.15s ease; }
    .hover-handle { opacity: 0; transition: opacity 0.1s; }
    .group:hover .hover-handle, .group\/card:hover .hover-handle { opacity: 1; }
    body.dragging, body.dragging * { cursor: grabbing !important; }
    /* Project editor */
    [contenteditable][data-placeholder]:empty::before { content: attr(data-placeholder); color: #9b9a97; pointer-events: none; }
    .notion-editor { line-height: 1.75; color: #37352f; }
    .dark .notion-editor { color: #e8e8e3; }
    .notion-editor p { margin: 0.15em 0; }
    .notion-editor h1 { font-size: 1.875rem; font-weight: 700; margin: 0.6em 0 0.2em; }
    .notion-editor h2 { font-size: 1.4rem; font-weight: 700; margin: 0.5em 0 0.2em; }
    .notion-editor h3 { font-size: 1.15rem; font-weight: 600; margin: 0.4em 0 0.1em; }
    .notion-editor ul { list-style: disc; padding-left: 1.5rem; }
    .notion-editor ol { list-style: decimal; padding-left: 1.5rem; }
    .notion-editor li { margin: 0.15em 0; }
    .notion-editor blockquote { border-left: 3px solid #e2e8f0; padding-left: 1em; color: #64748b; }
    .dark .notion-editor blockquote { border-left-color: #374151; }
    .notion-editor hr { border: none; border-top: 1px solid #e2e8f0; margin: 1.2em 0; }
    .dark .notion-editor hr { border-top-color: #374151; }
    .notion-editor code { background: #f1f5f9; padding: 0.1em 0.35em; border-radius: 4px; font-family: monospace; font-size: 0.88em; }
    .dark .notion-editor code { background: #1e293b; }
    .toolbar-btn { min-width: 28px; height: 28px; display:flex; align-items:center; justify-content:center; border-radius: 6px; font-size: 13px; color: #64748b; cursor: pointer; transition: background 0.1s, color 0.1s; border: none; background: transparent; }
    .toolbar-btn:hover { background: #f1f5f9; color: #37352f; }
    .toolbar-btn.active { background: #e8e8e5; color: #37352f; }
    .dark .toolbar-btn { color: #9b9a97; }
    .dark .toolbar-btn:hover { background: #2f2f2f; color: #e8e8e3; }
    .dark .toolbar-btn.active { background: #3a3a3a; color: #e8e8e3; }
  </style>
</head>
<body class="bg-white dark:bg-notion-bg-dark">
  <div id="root"></div>

<script id="app-source" type="text/babel-source">
const { useState, useEffect, useRef, useCallback, createContext, useContext } = React;

// ── Firebase Config ─────────────────────────────────────
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyAQzMmpNwwmsLpes17SKnm3I0tZPzknXSI",
  authDomain:        "fake-notion-99ef6.firebaseapp.com",
  projectId:         "fake-notion-99ef6",
  storageBucket:     "fake-notion-99ef6.firebasestorage.app",
  messagingSenderId: "707999916308",
  appId:             "1:707999916308:web:da48f037a515b1fe68a201",
};

function isConfigured() {
  return FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.apiKey !== "YOUR_API_KEY";
}

let db = null;
if (isConfigured()) {
  firebase.initializeApp(FIREBASE_CONFIG);
  db = firebase.firestore();
}

// Unique ID for this browser session — used to identify the current editor
const SESSION_ID = (() => {
  let id = sessionStorage.getItem('fn-sid');
  if (!id) { id = Math.random().toString(36).slice(2, 10); sessionStorage.setItem('fn-sid', id); }
  return id;
})();

// ── Constants ───────────────────────────────────────────
const COLUMNS = [
  { id: "not-started",      label: "Not Started",      emoji: "\u{1F4CB}", color: "bg-gray-400" },
  { id: "working-on-it",    label: "Working On It",     emoji: "\u{1F528}", color: "bg-amber-400" },
  { id: "near-completion",  label: "Near Completion",   emoji: "\u{1F3C1}", color: "bg-blue-400" },
  { id: "complete",         label: "Complete",          emoji: "✅",    color: "bg-emerald-400" },
];

const PRIORITY_COLORS = {
  low:    { bg: "bg-green-50 dark:bg-green-950/40", text: "text-green-700 dark:text-green-400", dot: "bg-green-400" },
  medium: { bg: "bg-yellow-50 dark:bg-yellow-950/40", text: "text-yellow-700 dark:text-yellow-400", dot: "bg-yellow-400" },
  high:   { bg: "bg-red-50 dark:bg-red-950/40", text: "text-red-700 dark:text-red-400", dot: "bg-red-400" },
};

const USER_COLORS = [
  "#6366f1","#ec4899","#14b8a6","#f59e0b","#8b5cf6","#ef4444","#06b6d4","#84cc16",
];

const AppContext = createContext();

// ── Icons ───────────────────────────────────────────────
function Icon({ d, size = 16, className = "" }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"
         strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
      <path d={d} />
    </svg>
  );
}

const IC = {
  plus:        "M12 5v14M5 12h14",
  search:      "M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z",
  chevDown:    "M6 9l6 6 6-6",
  chevRight:   "M9 18l6-6-6-6",
  settings:    "M12 8a4 4 0 100 8 4 4 0 000-8z",
  sun:         "M12 3v1m0 16v1m-9-9h1m16 0h1m-2.636-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m11.314 11.314l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z",
  moon:        "M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z",
  x:           "M18 6L6 18M6 6l12 12",
  grip:        "M9 5h.01M9 12h.01M9 19h.01M15 5h.01M15 12h.01M15 19h.01",
  trash:       "M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6h14",
  calendar:    "M3 8h18M8 3v4M16 3v4M3 8v10a2 2 0 002 2h14a2 2 0 002-2V8",
  sidebar:     "M3 3h18v18H3zM9 3v18",
  board:       "M3 3h6v8H3zM3 13h6v8H3zM11 3h6v5H11zM11 10h6v11H11zM19 3h2v7h-2zM19 12h2v9h-2z",
  userPlus:    "M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M12.5 7a4 4 0 100-8 4 4 0 000 8zM20 8v6M23 11h-6",
  edit:        "M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z",
  link:        "M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71",
  file:        "M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8zM14 2v6h6M16 13H8M16 17H8M10 9H8",
  upload:      "M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12",
  move:        "M5 9l-3 3 3 3M9 5l3-3 3 3M15 19l-3 3-3-3M19 9l3 3-3 3M2 12h20M12 2v20",
  folderOpen:  "M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z",
};

// ── Helpers ─────────────────────────────────────────────
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function getInitials(name) {
  return name.split(" ").map(w => w[0]).join("").toUpperCase().slice(0, 2);
}
function getUserColor(name) {
  let hash = 0;
  for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
  return USER_COLORS[Math.abs(hash) % USER_COLORS.length];
}
function fmtDate(d) {
  if (!d) return "";
  return new Date(d + "T00:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" });
}
function isOverdue(d) {
  if (!d) return false;
  const today = new Date(); today.setHours(0,0,0,0);
  return new Date(d + "T00:00:00") < today;
}
function daysUntilDue(d) {
  if (!d) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const due = new Date(d + "T00:00:00");
  return Math.round((due - today) / 86400000);
}

// ── Avatar ──────────────────────────────────────────────
function Avatar({ name, size = "sm" }) {
  const sizes = { xs: "w-5 h-5 text-[9px]", sm: "w-6 h-6 text-[10px]", md: "w-7 h-7 text-xs" };
  return (
    <div className={`${sizes[size]} rounded-full flex items-center justify-center text-white font-semibold flex-shrink-0 shadow-sm`}
         style={{ background: getUserColor(name) }} title={name}>
      {getInitials(name)}
    </div>
  );
}

// ═════════════════════════════════════════════════════════
//  SIDEBAR
// ═════════════════════════════════════════════════════════
function Sidebar({ collapsed, onToggle }) {
  const { users, addUser, removeUser, darkMode, setDarkMode, view, setView, projects } = useContext(AppContext);
  const [showTeam, setShowTeam] = useState(true);
  const [newName, setNewName] = useState("");

  function handleAddUser(e) {
    e.preventDefault();
    const t = newName.trim();
    if (t && !users.find(u => u.name.toLowerCase() === t.toLowerCase())) {
      addUser(t);
      setNewName("");
    }
  }

  if (collapsed) {
    return (
      <div className="w-10 flex-shrink-0 flex flex-col items-center py-3 gap-2 border-r border-gray-200 dark:border-gray-800 bg-gray-50 dark:bg-gray-950 sidebar-transition">
        <button onClick={onToggle} className="p-1.5 rounded hover:bg-notion-sidebar-hover dark:hover:bg-notion-sidebar-hover-dark text-notion-muted">
          <Icon d={IC.sidebar} size={16} />
        </button>
      </div>
    );
  }

  return (
    <div className="w-60 flex-shrink-0 flex flex-col border-r border-gray-200 dark:border-gray-800 bg-gray-50 dark:bg-gray-950 sidebar-transition overflow-hidden">
      {/* Workspace header */}
      <div className="flex items-center justify-between px-3 py-2.5 border-b border-gray-200 dark:border-gray-800">
        <div className="flex items-center gap-2 min-w-0">
          <div className="w-5 h-5 rounded bg-gradient-to-br from-blue-500 to-purple-500 flex items-center justify-center text-white text-[10px] font-bold flex-shrink-0">F</div>
          <span className="font-semibold text-sm text-notion-text dark:text-notion-text-dark truncate">Fake Notion</span>
        </div>
        <button onClick={onToggle} className="p-1 rounded hover:bg-notion-sidebar-hover dark:hover:bg-notion-sidebar-hover-dark text-notion-muted">
          <Icon d={IC.sidebar} size={14} />
        </button>
      </div>

      {/* Nav */}
      <div className="flex-1 overflow-y-auto py-2 px-1.5">
        <SidebarItem icon={IC.board}       label="Board"    active={view.type === 'board'}                              onClick={() => setView({ type: 'board' })} />
        <SidebarItem icon={IC.edit}        label="Projects" active={view.type === 'projects' || view.type === 'project'} onClick={() => setView({ type: 'projects' })} />
        <SidebarItem icon={IC.folderOpen}  label="Files"    active={view.type === 'files'}                              onClick={() => setView({ type: 'files' })} />
        <SidebarItem icon={IC.search}      label="Search" />

        {/* Team */}
        <div className="mt-5 mb-1 px-2">
          <button onClick={() => setShowTeam(!showTeam)}
                  className="flex items-center justify-between w-full text-[11px] font-semibold uppercase tracking-wider text-notion-muted hover:text-notion-text dark:hover:text-notion-text-dark">
            <span>Team</span>
            <Icon d={showTeam ? IC.chevDown : IC.chevRight} size={12} />
          </button>
        </div>

        {showTeam && (
          <div className="px-1 mb-2">
            {users.length === 0 && (
              <p className="text-xs text-notion-muted px-2 py-2 italic">No members yet</p>
            )}
            {users.map(u => (
              <div key={u.id} className="group flex items-center gap-2 px-2 py-1.5 rounded-md hover:bg-notion-sidebar-hover dark:hover:bg-notion-sidebar-hover-dark">
                <Avatar name={u.name} size="xs" />
                <span className="text-sm text-notion-text dark:text-notion-text-dark truncate flex-1">{u.name}</span>
                <button onClick={() => removeUser(u.id)}
                        className="hover-handle p-0.5 rounded hover:bg-red-100 dark:hover:bg-red-900/30 text-notion-muted hover:text-red-500">
                  <Icon d={IC.x} size={12} />
                </button>
              </div>
            ))}
            <form onSubmit={handleAddUser} className="flex items-center gap-1.5 mt-1.5 px-1">
              <input value={newName} onChange={e => setNewName(e.target.value)}
                     placeholder="Add member…"
                     className="flex-1 text-sm px-2 py-1 rounded-md border border-notion-border dark:border-notion-border-dark bg-white dark:bg-notion-bg-dark text-notion-text dark:text-notion-text-dark placeholder-notion-muted outline-none focus:border-notion-accent" />
              <button type="submit" className="p-1 rounded-md hover:bg-notion-sidebar-hover dark:hover:bg-notion-sidebar-hover-dark text-notion-muted hover:text-notion-accent">
                <Icon d={IC.userPlus} size={14} />
              </button>
            </form>
          </div>
        )}

        {/* Projects in sidebar */}
        {projects.length > 0 && (
          <div className="mt-5 mb-1">
            <div className="px-2 mb-1">
              <span className="text-[11px] font-semibold uppercase tracking-wider text-notion-muted">Projects</span>
            </div>
            {projects.map(p => (
              <div key={p.id} onClick={() => setView({ type: 'project', projectId: p.id })}
                   className={`flex items-center gap-2 px-2 py-1.5 rounded-md cursor-pointer text-sm transition-colors
                     ${view.type === 'project' && view.projectId === p.id
                       ? "bg-notion-sidebar-hover dark:bg-notion-sidebar-hover-dark text-notion-text dark:text-notion-text-dark font-medium"
                       : "text-notion-muted hover:bg-notion-sidebar-hover dark:hover:bg-notion-sidebar-hover-dark hover:text-notion-text dark:hover:text-notion-text-dark"
                     }`}>
                <span className="text-sm flex-shrink-0">{p.emoji || "📝"}</span>
                <span className="truncate">{p.title || "Untitled"}</span>
              </div>
            ))}
          </div>
        )}

        <SidebarItem icon={IC.settings} label="Settings" />
      </div>

      {/* Footer */}
      <div className="px-3 py-2.5 border-t border-gray-200 dark:border-gray-800">
        <p className="text-[11px] text-gray-400 dark:text-gray-600 px-1">Fake Notion · local</p>
      </div>
    </div>
  );
}

function SidebarItem({ icon, label, active = false, onClick }) {
  return (
    <div onClick={onClick} className={`flex items-center gap-2 px-2 py-1.5 rounded-md cursor-pointer text-sm transition-colors
      ${active
        ? "bg-notion-sidebar-hover dark:bg-notion-sidebar-hover-dark text-notion-text dark:text-notion-text-dark font-medium"
        : "text-notion-muted hover:bg-notion-sidebar-hover dark:hover:bg-notion-sidebar-hover-dark hover:text-notion-text dark:hover:text-notion-text-dark"
      }`}>
      <Icon d={icon} size={15} />
      <span>{label}</span>
    </div>
  );
}

// ═════════════════════════════════════════════════════════
//  THEME TOGGLE (pill switch)
// ═════════════════════════════════════════════════════════
function ThemeToggle() {
  const { darkMode, setDarkMode } = useContext(AppContext);
  return (
    <button
      onClick={() => setDarkMode(!darkMode)}
      title={darkMode ? "Switch to light" : "Switch to dark"}
      className={`relative flex items-center w-14 h-7 rounded-full border-2 transition-colors duration-200 focus:outline-none
        ${darkMode
          ? "bg-gray-800 border-gray-600"
          : "bg-gray-200 border-gray-300"
        }`}
    >
      {/* Track labels */}
      <span className={`absolute left-1.5 text-[10px] font-bold transition-opacity duration-200 select-none
        ${darkMode ? "opacity-0" : "opacity-100 text-gray-500"}`}>☀</span>
      <span className={`absolute right-1.5 text-[10px] font-bold transition-opacity duration-200 select-none
        ${darkMode ? "opacity-100 text-gray-400" : "opacity-0"}`}>☽</span>
      {/* Knob */}
      <span className={`absolute w-5 h-5 rounded-full shadow-md transition-transform duration-200
        ${darkMode
          ? "translate-x-7 bg-gray-200"
          : "translate-x-0.5 bg-white"
        }`} />
    </button>
  );
}

// ═════════════════════════════════════════════════════════
//  TOP BAR
// ═════════════════════════════════════════════════════════
function TopBar() {
  const { cards } = useContext(AppContext);
  const total = cards.length;
  const done = cards.filter(c => c.status === "complete").length;

  return (
    <div className="h-11 flex items-center justify-between px-4 border-b border-gray-200 dark:border-gray-800 bg-gray-50/90 dark:bg-gray-950/90 backdrop-blur-sm flex-shrink-0">
      <div className="flex items-center gap-1.5 text-sm text-notion-muted">
        <span className="px-1.5 py-0.5 rounded cursor-default">Fake Notion</span>
        <span className="text-gray-300 dark:text-gray-700">/</span>
        <span className="text-notion-text dark:text-notion-text-dark font-medium px-1.5 py-0.5">Board</span>
      </div>
      <div className="flex items-center gap-4">
        {total > 0 && (
          <span className="text-xs text-notion-muted bg-gray-100 dark:bg-gray-800 px-2 py-0.5 rounded-full">{done}/{total} done</span>
        )}
        <ThemeToggle />
      </div>
    </div>
  );
}

// ═════════════════════════════════════════════════════════
//  CARD INNER (shared by CardItem and drag clone)
// ═════════════════════════════════════════════════════════
function CardInner({ card, users }) {
  const assignee = users.find(u => u.id === card.assignedTo);
  const prio = PRIORITY_COLORS[card.priority] || PRIORITY_COLORS.medium;
  return (
    <>
      <p className="text-sm font-medium text-notion-text dark:text-notion-text-dark leading-snug mb-1.5">{card.title}</p>
      {card.description && (
        <p className="text-xs text-notion-muted leading-relaxed mb-2" style={{display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',overflow:'hidden'}}>{card.description}</p>
      )}
      <div className="flex items-center justify-between gap-2">
        <div className="flex items-center gap-1.5 flex-wrap">
          {card.priority && (
            <span className={`inline-flex items-center gap-1 text-[10px] font-semibold uppercase tracking-wide px-1.5 py-0.5 rounded-full ${prio.bg} ${prio.text}`}>
              <span className={`w-1.5 h-1.5 rounded-full ${prio.dot}`}></span>
              {card.priority}
            </span>
          )}
          {card.dueDate && (() => {
            const d = daysUntilDue(card.dueDate);
            const cls = d < 0   ? "text-red-500 font-semibold"
                      : d === 0 ? "text-red-500 font-semibold"
                      : d <= 2  ? "text-orange-500 font-medium"
                      : d <= 4  ? "text-yellow-600 dark:text-yellow-400 font-medium"
                      : "text-notion-muted";
            return (
              <span className={`text-[11px] flex items-center gap-1 ${cls}`}>
                <Icon d={IC.calendar} size={11} />
                {d === 0 ? "Today" : d === 1 ? "Tomorrow" : fmtDate(card.dueDate)}
              </span>
            );
          })()}
        </div>
        {assignee && <Avatar name={assignee.name} size="sm" />}
      </div>
    </>
  );
}

// ═════════════════════════════════════════════════════════
//  DRAG OVERLAY (floating clone that follows the cursor)
// ═════════════════════════════════════════════════════════
function DragOverlay({ drag }) {
  const { users } = useContext(AppContext);
  const overlayRef = useRef(null);

  const x = drag.snapping ? drag.startX : drag.x - drag.offsetX;
  const y = drag.snapping ? drag.startY : drag.y - drag.offsetY;

  return (
    <div ref={overlayRef}
         style={{
           position: 'fixed',
           left: x,
           top: y,
           width: drag.width,
           zIndex: 9999,
           pointerEvents: 'none',
           transform: drag.snapping ? 'scale(1) rotate(0deg)' : 'scale(1.03) rotate(1deg)',
           opacity: drag.snapping ? 0.5 : 1,
           transition: drag.snapping
             ? 'left 0.25s ease, top 0.25s ease, opacity 0.25s ease, transform 0.25s ease'
             : 'transform 0.1s ease',
         }}>
      <div className="bg-white dark:bg-gray-900 border border-notion-accent rounded-2xl shadow-2xl px-3 py-2.5">
        <CardInner card={drag.card} users={users} />
      </div>
    </div>
  );
}

// ═════════════════════════════════════════════════════════
//  CARD
// ═════════════════════════════════════════════════════════
function CardItem({ card, onEdit, onDragStart }) {
  const { users, activeDragId } = useContext(AppContext);
  const isDragging = activeDragId === card.id;
  const days = daysUntilDue(card.dueDate);

  // Red shading tiers: overdue, today/tomorrow, within 3 days
  const dueTint = card.dueDate
    ? days < 0   ? "border-red-300 bg-red-50/60 dark:border-red-900 dark:bg-red-950/30"
    : days === 0 ? "border-red-300 bg-red-50/50 dark:border-red-900 dark:bg-red-950/25"
    : days <= 2  ? "border-orange-200 bg-orange-50/50 dark:border-orange-900/60 dark:bg-orange-950/20"
    : days <= 4  ? "border-yellow-200 bg-yellow-50/30 dark:border-yellow-900/40 dark:bg-yellow-950/10"
    : ""
    : "";

  function handleMouseDown(e) {
    if (e.button !== 0) return;
    // Don't start drag if clicking the edit button
    if (e.target.closest('[data-edit-btn]')) return;
    e.preventDefault();
    const rect = e.currentTarget.getBoundingClientRect();
    onDragStart({
      card,
      startX: rect.left,
      startY: rect.top,
      width: rect.width,
      offsetX: e.clientX - rect.left,
      offsetY: e.clientY - rect.top,
      x: e.clientX,
      y: e.clientY,
    });
  }

  return (
    <div
      className={`group relative border rounded-2xl shadow-sm hover:shadow-md transition-all select-none
        ${dueTint || "bg-white dark:bg-gray-900 border-gray-200 dark:border-gray-700 hover:border-gray-300 dark:hover:border-gray-600"}
        ${isDragging ? "opacity-30 pointer-events-none" : "cursor-grab active:cursor-grabbing"}`}
      onMouseDown={handleMouseDown}
    >
      <div className="hover-handle absolute -left-5 top-1/2 -translate-y-1/2 p-0.5 text-notion-muted cursor-grab">
        <Icon d={IC.grip} size={14} />
      </div>
      {/* Pencil edit button — always visible top-right */}
      <button
        data-edit-btn="true"
        onClick={e => { e.stopPropagation(); onEdit(card); }}
        className="absolute top-2 right-2 p-1 rounded-md opacity-40 hover:opacity-100 hover:bg-gray-100 dark:hover:bg-gray-700 text-notion-muted hover:text-notion-text dark:hover:text-notion-text-dark transition-all z-10"
        title="Edit card"
      >
        <Icon d={IC.edit} size={13} />
      </button>
      <div className="px-3 py-2.5 pr-7">
        <CardInner card={card} users={users} />
      </div>
    </div>
  );
}

function CardModal({ card, defaultStatus, onClose, onSave, onDelete }) {
  const { users } = useContext(AppContext);
  const isEdit = !!card;
  const [title, setTitle] = useState(card?.title || "");
  const [description, setDescription] = useState(card?.description || "");
  const [assignedTo, setAssignedTo] = useState(card?.assignedTo || "");
  const [priority, setPriority] = useState(card?.priority || "medium");
  const [status, setStatus] = useState(card?.status || defaultStatus || "not-started");
  const [dueDate, setDueDate] = useState(card?.dueDate || "");
  const titleRef = useRef(null);
  const [showSlash, setShowSlash] = useState(false);

  useEffect(() => { titleRef.current?.focus(); }, []);

  function handleSubmit(e) {
    e.preventDefault();
    if (!title.trim()) return;
    onSave({
      ...(card || {}),
      id: card?.id || genId(),
      title: title.trim(),
      description: description.trim(),
      assignedTo, priority, status, dueDate,
    });
  }

  function handleDescKeyDown(e) {
    if (e.key === "/") { setShowSlash(true); }
    else if (e.key === "Escape") { setShowSlash(false); }
    else { setShowSlash(false); }
  }

  function insertSlashItem(text) {
    setDescription(prev => prev.replace(/\/$/, "") + text);
    setShowSlash(false);
  }

  const slashItems = [
    { label: "Heading", icon: "H", insert: "## " },
    { label: "To-do", icon: "☐", insert: "[ ] " },
    { label: "Bullet list", icon: "•", insert: "• " },
    { label: "Divider", icon: "—", insert: "\n---\n" },
    { label: "Mention user", icon: "@", insert: "@" },
  ];

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-[2px] p-4"
         onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal-enter bg-white dark:bg-gray-900 rounded-2xl shadow-2xl w-full max-w-lg border border-gray-200 dark:border-gray-700 overflow-hidden">
        <div className="flex items-center justify-between px-6 pt-5 pb-3">
          <h2 className="text-lg font-semibold text-notion-text dark:text-notion-text-dark">
            {isEdit ? "Edit card" : "New card"}
          </h2>
          <button onClick={onClose} className="p-1.5 rounded-lg hover:bg-notion-sidebar-hover dark:hover:bg-notion-sidebar-hover-dark text-notion-muted">
            <Icon d={IC.x} size={16} />
          </button>
        </div>

        <form onSubmit={handleSubmit} className="px-6 pb-6">
          <input ref={titleRef} value={title} onChange={e => setTitle(e.target.value)}
                 placeholder="Untitled"
                 className="w-full text-xl font-semibold text-notion-text dark:text-notion-text-dark placeholder-notion-muted bg-transparent outline-none py-1 mb-3" />

          <div className="relative mb-4">
            <textarea value={description} onChange={e => setDescription(e.target.value)}
                      onKeyDown={handleDescKeyDown}
                      placeholder="Add a description… (type / for commands)"
                      rows={3}
                      className="w-full text-sm text-notion-text dark:text-notion-text-dark placeholder-notion-muted bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg px-3 py-2.5 outline-none focus:border-notion-accent resize-y leading-relaxed" />
            {showSlash && (
              <div className="slash-menu absolute left-0 bottom-full mb-1 bg-white dark:bg-notion-sidebar-dark border border-notion-border dark:border-notion-border-dark rounded-lg shadow-xl py-1 w-52 z-10">
                <div className="px-3 py-1 text-[10px] font-semibold uppercase text-notion-muted tracking-wider">Blocks</div>
                {slashItems.map(item => (
                  <button key={item.label} type="button"
                          onClick={() => insertSlashItem(item.insert)}
                          className="flex items-center gap-2.5 w-full px-3 py-1.5 text-sm text-notion-text dark:text-notion-text-dark hover:bg-notion-sidebar-hover dark:hover:bg-notion-sidebar-hover-dark text-left">
                    <span className="w-6 h-6 flex items-center justify-center rounded bg-notion-sidebar dark:bg-notion-bg-dark text-xs font-medium border border-notion-border dark:border-notion-border-dark">{item.icon}</span>
                    {item.label}
                  </button>
                ))}
              </div>
            )}
          </div>

          <div className="grid grid-cols-2 gap-3 mb-4">
            <div>
              <label className="text-[11px] font-semibold uppercase tracking-wide text-notion-muted mb-1 block">Assigned to</label>
              <select value={assignedTo} onChange={e => setAssignedTo(e.target.value)}
                      className="w-full text-sm bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 text-notion-text dark:text-notion-text-dark rounded-lg px-2.5 py-2 outline-none focus:border-notion-accent">
                <option value="">Unassigned</option>
                {users.map(u => <option key={u.id} value={u.id}>{u.name}</option>)}
              </select>
            </div>
            <div>
              <label className="text-[11px] font-semibold uppercase tracking-wide text-notion-muted mb-1 block">Priority</label>
              <select value={priority} onChange={e => setPriority(e.target.value)}
                      className="w-full text-sm bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 text-notion-text dark:text-notion-text-dark rounded-lg px-2.5 py-2 outline-none focus:border-notion-accent">
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
              </select>
            </div>
            <div>
              <label className="text-[11px] font-semibold uppercase tracking-wide text-notion-muted mb-1 block">Status</label>
              <select value={status} onChange={e => setStatus(e.target.value)}
                      className="w-full text-sm bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 text-notion-text dark:text-notion-text-dark rounded-lg px-2.5 py-2 outline-none focus:border-notion-accent">
                {COLUMNS.map(c => <option key={c.id} value={c.id}>{c.emoji} {c.label}</option>)}
              </select>
            </div>
            <div>
              <label className="text-[11px] font-semibold uppercase tracking-wide text-notion-muted mb-1 block">Due date</label>
              <input type="date" value={dueDate} onChange={e => setDueDate(e.target.value)}
                     className="w-full text-sm bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 text-notion-text dark:text-notion-text-dark rounded-lg px-2.5 py-2 outline-none focus:border-notion-accent" />
            </div>
          </div>

          <div className="flex items-center justify-between pt-2 border-t border-gray-100 dark:border-gray-800">
            {isEdit ? (
              <button type="button" onClick={() => onDelete(card.id)}
                      className="text-sm text-red-500 hover:text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 px-3 py-1.5 rounded-lg transition-colors font-medium">Delete</button>
            ) : <div />}
            <div className="flex items-center gap-2">
              <button type="button" onClick={onClose}
                      className="text-sm text-notion-muted hover:text-notion-text dark:hover:text-notion-text-dark hover:bg-notion-sidebar-hover dark:hover:bg-notion-sidebar-hover-dark px-3 py-1.5 rounded-lg transition-colors font-medium">Cancel</button>
              <button type="submit"
                      className="text-sm font-medium bg-notion-text dark:bg-notion-text-dark text-white dark:text-notion-bg-dark px-4 py-1.5 rounded-lg hover:opacity-90 transition-opacity">
                {isEdit ? "Save" : "Create"}
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
  );
}

// ═════════════════════════════════════════════════════════
//  PROJECT EDITOR
// ═════════════════════════════════════════════════════════
function ProjectEditor({ projectId }) {
  const { projects, users, updateProject, deleteProject, setView } = useContext(AppContext);
  const project = projects.find(p => p.id === projectId);
  const editorRef = useRef(null);
  const saveTimer = useRef(null);
  const [title, setTitle] = useState("");
  const [emoji, setEmoji] = useState("📝");
  const [activeFormats, setActiveFormats] = useState({});

  // Initial load when switching projects
  useEffect(() => {
    if (!project) return;
    setTitle(project.title || "");
    setEmoji(project.emoji || "📝");
    if (editorRef.current) {
      editorRef.current.innerHTML = project.content || "";
    }
  }, [projectId]); // eslint-disable-line

  // Real-time sync: title + emoji always update from Firestore
  useEffect(() => {
    if (!project) return;
    setTitle(project.title || "");
    setEmoji(project.emoji || "📝");
  }, [project?.title, project?.emoji]); // eslint-disable-line

  // Real-time sync: apply remote content unless user typed in the last 1.5s
  useEffect(() => {
    if (!project || !editorRef.current) return;
    const isTypingNow = Date.now() - lastTyped.current < 1500;
    if (!isTypingNow) {
      editorRef.current.innerHTML = project.content || "";
    }
  }, [project?.content]); // eslint-disable-line

  // Track active formatting whenever selection changes
  useEffect(() => {
    function updateFormats() {
      if (!editorRef.current) return;
      const sel = window.getSelection();
      if (!sel || !editorRef.current.contains(sel.anchorNode)) return;
      try {
        const block = document.queryCommandValue('formatBlock').toLowerCase();
        setActiveFormats({
          bold:                 document.queryCommandState('bold'),
          italic:               document.queryCommandState('italic'),
          underline:            document.queryCommandState('underline'),
          strikeThrough:        document.queryCommandState('strikeThrough'),
          insertUnorderedList:  document.queryCommandState('insertUnorderedList'),
          insertOrderedList:    document.queryCommandState('insertOrderedList'),
          h1:         block === 'h1',
          h2:         block === 'h2',
          h3:         block === 'h3',
          blockquote: block === 'blockquote',
          pre:        block === 'pre',
        });
      } catch(e) {}
    }
    document.addEventListener('selectionchange', updateFormats);
    return () => document.removeEventListener('selectionchange', updateFormats);
  }, []);

  const forceTimer = useRef(null);
  const lastTyped = useRef(0);
  const presenceTimer = useRef(null);
  const [remoteEditor, setRemoteEditor] = useState(null);

  // Display name for this session — stored in localStorage
  const sessionName = useRef(localStorage.getItem('fn-name') || 'A teammate');

  // Watch for another user's presence on this document
  useEffect(() => {
    const p = project?.presence;
    if (!p || p.id === SESSION_ID) { setRemoteEditor(null); return; }
    const age = Date.now() - new Date(p.at).getTime();
    setRemoteEditor(age < 5000 ? p : null);
  }, [project?.presence?.at]); // eslint-disable-line

  function writePresence() {
    if (!db) return;
    db.collection('projects').doc(projectId).update({
      presence: { id: SESSION_ID, name: sessionName.current, at: new Date().toISOString() }
    }).catch(() => {});
  }

  function clearPresence() {
    if (!db) return;
    db.collection('projects').doc(projectId).update({ presence: null }).catch(() => {});
  }

  function doSave(overrides = {}) {
    updateProject(projectId, {
      title: overrides.title ?? title,
      emoji: overrides.emoji ?? emoji,
      content: editorRef.current?.innerHTML || "",
      updatedAt: new Date().toISOString(),
    });
  }

  function save(overrides = {}) {
    // Debounce: save 300ms after last keystroke
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      clearTimeout(forceTimer.current);
      forceTimer.current = null;
      doSave(overrides);
    }, 300);

    // Force-save every 2s even if typing is continuous
    if (!forceTimer.current) {
      forceTimer.current = setTimeout(() => {
        forceTimer.current = null;
        clearTimeout(saveTimer.current);
        doSave(overrides);
      }, 2000);
    }
  }

  function fmt(cmd, val = null) {
    editorRef.current?.focus();
    document.execCommand(cmd, false, val);
    save();
  }

  function cycleEmoji() {
    const idx = (PROJECT_EMOJIS.indexOf(emoji) + 1) % PROJECT_EMOJIS.length;
    const next = PROJECT_EMOJIS[idx];
    setEmoji(next);
    save({ emoji: next });
  }

  if (!project) return (
    <div className="flex-1 flex items-center justify-center text-notion-muted text-sm">Project not found</div>
  );

  const toolbarGroups = [
    [
      { label: "B",   activeKey: "bold",                title: "Bold (⌘B)",       cls: "font-bold",            action: () => fmt("bold") },
      { label: "I",   activeKey: "italic",              title: "Italic (⌘I)",      cls: "italic",               action: () => fmt("italic") },
      { label: "U",   activeKey: "underline",           title: "Underline (⌘U)",   cls: "underline",            action: () => fmt("underline") },
      { label: "S",   activeKey: "strikeThrough",       title: "Strikethrough",    cls: "line-through",         action: () => fmt("strikeThrough") },
    ],
    [
      { label: "H1",  activeKey: "h1",                  title: "Heading 1",        cls: "font-bold text-[11px]",action: () => fmt("formatBlock", "h1") },
      { label: "H2",  activeKey: "h2",                  title: "Heading 2",        cls: "font-bold text-[11px]",action: () => fmt("formatBlock", "h2") },
      { label: "H3",  activeKey: "h3",                  title: "Heading 3",        cls: "font-bold text-[11px]",action: () => fmt("formatBlock", "h3") },
    ],
    [
      { label: "•",   activeKey: "insertUnorderedList", title: "Bullet list",      cls: "text-base leading-none",    action: () => fmt("insertUnorderedList") },
      { label: "1.",  activeKey: "insertOrderedList",   title: "Numbered list",    cls: "text-[11px] font-semibold", action: () => fmt("insertOrderedList") },
      { label: "❝",   activeKey: "blockquote",          title: "Blockquote",       cls: "",                          action: () => fmt("formatBlock", "blockquote") },
    ],
    [
      { label: "</>", activeKey: "pre",                 title: "Code block",       cls: "font-mono text-[10px]",action: () => fmt("formatBlock", "pre") },
      { label: "—",   activeKey: null,                  title: "Divider",          cls: "text-base leading-none",action: () => { editorRef.current?.focus(); document.execCommand("insertHorizontalRule"); save(); } },
      { label: "⌫",   activeKey: null,                  title: "Clear format",     cls: "",                     action: () => fmt("removeFormat") },
    ],
  ];

  return (
    <div className="flex-1 flex flex-col overflow-hidden">
      {/* Top bar */}
      <div className="h-11 flex items-center justify-between px-4 border-b border-gray-200 dark:border-gray-800 bg-gray-50/90 dark:bg-gray-950/90 backdrop-blur-sm flex-shrink-0">
        <div className="flex items-center gap-1.5 text-sm">
          <button onClick={() => setView({ type: 'projects' })}
                  className="flex items-center gap-1 text-notion-muted hover:text-notion-text dark:hover:text-notion-text-dark hover:bg-gray-100 dark:hover:bg-gray-800 px-2 py-1 rounded-md transition-colors">
            <Icon d="M15 18l-6-6 6-6" size={13} />
            <span>Projects</span>
          </button>
          <span className="text-gray-300 dark:text-gray-700">/</span>
          <span className="text-notion-text dark:text-notion-text-dark font-medium px-1.5 py-0.5 max-w-[180px] truncate">{title || "Untitled"}</span>
        </div>
        <div className="flex items-center gap-3">
          <span className="text-xs text-gray-400">auto-saved</span>
          <button onClick={() => { if (confirm("Delete this project?")) { deleteProject(projectId); setView({ type: 'projects' }); }}}
                  className="p-1.5 rounded-lg text-gray-400 hover:bg-red-50 dark:hover:bg-red-900/20 hover:text-red-500 transition-colors">
            <Icon d={IC.trash} size={14} />
          </button>
          <ThemeToggle />
        </div>
      </div>

      {/* Format toolbar */}
      <div className="flex items-center gap-1 px-5 py-1.5 border-b border-gray-100 dark:border-gray-800/60 bg-white dark:bg-gray-950 flex-shrink-0 flex-wrap">
        {toolbarGroups.map((group, gi) => (
          <React.Fragment key={gi}>
            {gi > 0 && <div className="w-px h-4 bg-gray-200 dark:bg-gray-700 mx-0.5 flex-shrink-0" />}
            {group.map(btn => (
              <button key={btn.label} title={btn.title}
                      onMouseDown={e => { e.preventDefault(); btn.action(); }}
                      className={`toolbar-btn ${btn.cls} ${btn.activeKey && activeFormats[btn.activeKey] ? 'active' : ''}`}>
                {btn.label}
              </button>
            ))}
          </React.Fragment>
        ))}
      </div>

      {/* Editor canvas */}
      <div className="flex-1 overflow-y-auto bg-white dark:bg-notion-bg-dark">
        <div className="max-w-2xl mx-auto px-14 pt-12 pb-24">
          {/* Emoji */}
          <button onClick={cycleEmoji} title="Click to change emoji"
                  className="text-5xl mb-3 hover:opacity-80 transition-opacity block">
            {emoji}
          </button>
          {/* Title */}
          <input value={title}
                 onChange={e => { setTitle(e.target.value); save({ title: e.target.value }); }}
                 placeholder="Untitled"
                 className="w-full text-4xl font-bold text-notion-text dark:text-notion-text-dark bg-transparent outline-none placeholder-gray-200 dark:placeholder-gray-800 mb-6 leading-tight" />
          {/* Divider */}
          <div className="border-t border-gray-100 dark:border-gray-800 mb-6" />

          {/* Remote editor presence banner */}
          {remoteEditor && (
            <div className="flex items-center gap-2 mb-4 px-4 py-2.5 bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-700 rounded-xl text-sm text-amber-800 dark:text-amber-300">
              <span className="text-base">✏️</span>
              <span><strong>{remoteEditor.name}</strong> is currently editing — your changes may overwrite theirs</span>
            </div>
          )}

          {/* Content */}
          <div ref={editorRef}
               contentEditable
               suppressContentEditableWarning
               data-placeholder="Start writing… or type / for commands"
               className="notion-editor outline-none min-h-[400px]"
               onInput={() => {
                 lastTyped.current = Date.now();
                 save();
                 writePresence();
                 clearTimeout(presenceTimer.current);
                 presenceTimer.current = setTimeout(clearPresence, 3500);
               }}
               onBlur={() => {
                 clearTimeout(presenceTimer.current);
                 clearPresence();
               }}
               onKeyDown={e => {
                 if ((e.metaKey || e.ctrlKey) && e.key === 'b') { e.preventDefault(); fmt('bold'); }
                 if ((e.metaKey || e.ctrlKey) && e.key === 'i') { e.preventDefault(); fmt('italic'); }
                 if ((e.metaKey || e.ctrlKey) && e.key === 'u') { e.preventDefault(); fmt('underline'); }
               }}
          />
        </div>
      </div>
    </div>
  );
}

const LINK_COLOR = { border: "border-blue-200 dark:border-blue-800", bg: "bg-blue-50 dark:bg-blue-900/20", text: "text-blue-600 dark:text-blue-400", dot: "bg-blue-400", badge: "bg-blue-100 dark:bg-blue-900/40 text-blue-600 dark:text-blue-300" };
const FILE_COLOR = { border: "border-purple-200 dark:border-purple-800", bg: "bg-purple-50 dark:bg-purple-900/20", text: "text-purple-600 dark:text-purple-400", dot: "bg-purple-400", badge: "bg-purple-100 dark:bg-purple-900/40 text-purple-600 dark:text-purple-300" };

function folderColor(type) { return type === 'link' ? LINK_COLOR : FILE_COLOR; }
function fmtSize(bytes) { return bytes < 1024 ? bytes + ' B' : bytes < 1048576 ? (bytes/1024).toFixed(1) + ' KB' : (bytes/1048576).toFixed(1) + ' MB'; }

// ─── Add File Modal ─────────────────────────────────────
function AddFileModal({ fileFolders, onClose, onSave, onCreateFolder }) {
  const [fileObj, setFileObj] = useState(null);
  const [dragging, setDragging] = useState(false);
  const [err, setErr] = useState('');
  const folders = fileFolders.length > 0 ? fileFolders : [{ id: 'misc', name: 'Misc' }];
  const [folderId, setFolderId] = useState(folders[0].id);
  const inputRef = useRef(null);

  function processFile(f) {
    if (f.size > 750 * 1024) { setErr('Max 750 KB — larger files need Firebase Storage'); return; }
    setErr('');
    const reader = new FileReader();
    reader.onload = e => setFileObj({ name: f.name, type: f.type, size: f.size, data: e.target.result });
    reader.readAsDataURL(f);
  }

  function handleDrop(e) { e.preventDefault(); setDragging(false); const f = e.dataTransfer.files[0]; if (f) processFile(f); }

  function handleSave(e) {
    e.preventDefault();
    if (!fileObj) return;
    onSave({ title: fileObj.name, fileName: fileObj.name, fileType: fileObj.type, fileSize: fileObj.size, fileData: fileObj.data, folderId });
  }

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-[2px] p-4"
         onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal-enter bg-white dark:bg-gray-900 rounded-2xl shadow-2xl border border-gray-200 dark:border-gray-700 w-full max-w-md">
        <div className="flex items-center justify-between px-6 pt-5 pb-3">
          <h2 className="text-lg font-semibold text-notion-text dark:text-notion-text-dark">Add File</h2>
          <button onClick={onClose} className="p-1.5 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 text-notion-muted"><Icon d={IC.x} size={16} /></button>
        </div>
        <form onSubmit={handleSave} className="px-6 pb-6 space-y-3">
          <input ref={inputRef} type="file" className="hidden" onChange={e => { if(e.target.files[0]) processFile(e.target.files[0]); }} />
          <div onDragOver={e => { e.preventDefault(); setDragging(true); }}
               onDragLeave={() => setDragging(false)}
               onDrop={handleDrop}
               onClick={() => inputRef.current?.click()}
               className={`flex flex-col items-center justify-center gap-3 py-8 border-2 border-dashed rounded-2xl cursor-pointer transition-all
                 ${dragging ? 'border-purple-400 bg-purple-50 dark:bg-purple-950/20' : 'border-gray-300 dark:border-gray-700 hover:border-purple-300 hover:bg-purple-50/30 dark:hover:bg-purple-950/10'}`}>
            {fileObj ? (
              <div className="flex items-center gap-3 w-full px-4">
                <div className="w-10 h-10 rounded-xl bg-purple-100 dark:bg-purple-900/40 flex items-center justify-center text-lg flex-shrink-0">📄</div>
                <div className="min-w-0 flex-1">
                  <p className="text-sm font-medium text-notion-text dark:text-notion-text-dark truncate">{fileObj.name}</p>
                  <p className="text-xs text-notion-muted">{fmtSize(fileObj.size)}</p>
                </div>
                <button type="button" onClick={e => { e.stopPropagation(); setFileObj(null); }} className="p-1 text-notion-muted hover:text-red-500">
                  <Icon d={IC.x} size={14} />
                </button>
              </div>
            ) : (
              <>
                <div className="w-12 h-12 rounded-2xl bg-purple-100 dark:bg-purple-900/40 flex items-center justify-center text-purple-500">
                  <Icon d={IC.upload} size={22} />
                </div>
                <div className="text-center">
                  <p className="text-sm font-medium text-notion-text dark:text-notion-text-dark">Drop file here</p>
                  <p className="text-xs text-notion-muted mt-0.5">or click to browse · max 750 KB</p>
                </div>
              </>
            )}
          </div>
          {err && <p className="text-xs text-red-500">{err}</p>}
          <div>
            <div className="flex items-center justify-between mb-1">
              <label className="text-[11px] font-semibold uppercase tracking-wide text-notion-muted">Folder</label>
              <button type="button" onClick={onCreateFolder} className="text-[11px] text-notion-accent hover:underline">+ New folder</button>
            </div>
            <select value={folderId} onChange={e => setFolderId(e.target.value)}
                    className="w-full text-sm bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 text-notion-text dark:text-notion-text-dark rounded-lg px-3 py-2 outline-none focus:border-notion-accent">
              {folders.map(f => <option key={f.id} value={f.id}>{f.name}</option>)}
            </select>
          </div>
          <div className="flex justify-end gap-2 pt-2">
            <button type="button" onClick={onClose} className="px-4 py-1.5 text-sm text-notion-muted hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg">Cancel</button>
            <button type="submit" disabled={!fileObj}
                    className={`px-4 py-1.5 text-sm font-medium rounded-lg transition-all ${fileObj ? 'bg-purple-500 text-white hover:bg-purple-600' : 'bg-gray-200 dark:bg-gray-700 text-gray-400 cursor-not-allowed'}`}>
              Save File
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

// ─── Item Row ────────────────────────────────────────────
function ItemRow({ item, isLink, compatibleFolders, onRelocate, onDelete, isLast }) {
  const [showMove, setShowMove] = useState(false);
  const moveRef = useRef(null);

  useEffect(() => {
    if (!showMove) return;
    function close(e) { if (moveRef.current && !moveRef.current.contains(e.target)) setShowMove(false); }
    document.addEventListener('mousedown', close);
    return () => document.removeEventListener('mousedown', close);
  }, [showMove]);

  function handleOpen() {
    if (isLink) { window.open(item.url, '_blank', 'noopener'); return; }
    if (item.fileData) { const a = document.createElement('a'); a.href = item.fileData; a.download = item.fileName || 'file'; a.click(); }
  }

  const ext = item.fileType?.split('/')[1]?.toUpperCase().slice(0,4) || 'FILE';

  return (
    <tr className={`hover:bg-gray-50 dark:hover:bg-gray-900/50 transition-colors ${!isLast ? 'border-b border-gray-100 dark:border-gray-800' : ''}`}>
      <td className="px-4 py-2.5 max-w-[220px]">
        <button onClick={handleOpen} title={isLink ? item.url : item.fileName}
                className="text-sm font-medium text-notion-text dark:text-notion-text-dark hover:text-notion-accent truncate block text-left w-full">
          {item.title || item.fileName}
        </button>
      </td>
      {isLink && (
        <td className="px-4 py-2.5 max-w-[200px]">
          <span className="text-xs text-notion-muted truncate block">{item.url}</span>
        </td>
      )}
      {!isLink && (
        <td className="px-4 py-2.5"><span className="text-xs font-mono text-notion-muted">{ext}</span></td>
      )}
      {!isLink && (
        <td className="px-4 py-2.5"><span className="text-xs text-notion-muted">{item.fileSize ? fmtSize(item.fileSize) : '—'}</span></td>
      )}
      <td className="px-4 py-2.5 whitespace-nowrap">
        <span className="text-xs text-notion-muted">
          {item.createdAt ? new Date(item.createdAt).toLocaleDateString("en-US", { month:"short", day:"numeric" }) : '—'}
        </span>
      </td>
      <td className="px-4 py-2.5">
        <div className="flex items-center gap-0.5 justify-end">
          {compatibleFolders.length > 0 && (
            <div className="relative" ref={moveRef}>
              <button onClick={() => setShowMove(!showMove)} title="Move to folder"
                      className="p-1.5 rounded-md text-notion-muted hover:bg-gray-100 dark:hover:bg-gray-800 hover:text-notion-text dark:hover:text-notion-text-dark transition-colors">
                <Icon d={IC.move} size={13} />
              </button>
              {showMove && (
                <div className="absolute right-0 top-full mt-1 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl shadow-xl py-1.5 z-20 min-w-[150px]">
                  <div className="px-3 py-1 text-[10px] font-semibold uppercase text-notion-muted tracking-wider">Move to</div>
                  {compatibleFolders.map(f => (
                    <button key={f.id} onClick={() => { onRelocate(item.id, f.id); setShowMove(false); }}
                            className="w-full text-left px-3 py-1.5 text-sm text-notion-text dark:text-notion-text-dark hover:bg-gray-50 dark:hover:bg-gray-800">
                      {f.name}
                    </button>
                  ))}
                </div>
              )}
            </div>
          )}
          <button onClick={() => { if(confirm('Delete this item?')) onDelete(item.id); }}
                  className="p-1.5 rounded-md text-notion-muted hover:bg-red-50 dark:hover:bg-red-900/20 hover:text-red-500 transition-colors">
            <Icon d={IC.trash} size={13} />
          </button>
        </div>
      </td>
    </tr>
  );
}

// ─── Folder Section ──────────────────────────────────────
function FolderSection({ folder, items, allFolders, onRelocate, onDelete }) {
  const isLink = folder.type === 'link';
  const c = folderColor(folder.type);
  const compat = allFolders.filter(f => f.type === folder.type && f.id !== folder.id);

  return (
    <div className={`border ${c.border} rounded-2xl overflow-hidden`}>
      <div className={`flex items-center gap-2.5 px-4 py-3 ${c.bg} border-b ${c.border}`}>
        <span>{isLink ? '🔗' : '📁'}</span>
        <span className={`font-semibold text-sm ${c.text}`}>{folder.name}</span>
        <span className={`text-[11px] font-bold px-2 py-0.5 rounded-full ${c.badge}`}>{items.length}</span>
      </div>
      {items.length === 0 ? (
        <div className="py-7 text-center text-xs text-notion-muted">No items — click Add files above</div>
      ) : (
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead>
              <tr className="bg-gray-50 dark:bg-gray-900 border-b border-gray-100 dark:border-gray-800">
                <th className="text-left px-4 py-2 text-[11px] font-semibold uppercase tracking-wide text-notion-muted">Name</th>
                {isLink && <th className="text-left px-4 py-2 text-[11px] font-semibold uppercase tracking-wide text-notion-muted">URL</th>}
                {!isLink && <th className="text-left px-4 py-2 text-[11px] font-semibold uppercase tracking-wide text-notion-muted">Type</th>}
                {!isLink && <th className="text-left px-4 py-2 text-[11px] font-semibold uppercase tracking-wide text-notion-muted">Size</th>}
                <th className="text-left px-4 py-2 text-[11px] font-semibold uppercase tracking-wide text-notion-muted">Added</th>
                <th className="px-4 py-2 w-20"></th>
              </tr>
            </thead>
            <tbody>
              {items.map((item, i) => (
                <ItemRow key={item.id} item={item} isLink={isLink}
                         compatibleFolders={compat}
                         onRelocate={onRelocate} onDelete={onDelete}
                         isLast={i === items.length - 1} />
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

// ─── Files View (main page) ──────────────────────────────
function FilesView() {
  const { fileTypes, fileItems, createFileType, createFileItem, updateFileItem, deleteFileItem } = useContext(AppContext);
  const [modal, setModal] = useState(null); // null | 'add' | 'link' | 'file' | 'folder'
  const [pendingType, setPendingType] = useState(null); // which type to open folder modal for

  const linkFolders = fileTypes.filter(f => f.type === 'link');
  const fileFolders  = fileTypes.filter(f => f.type === 'file');

  async function handleSaveLink(data) {
    // Auto-create Misc folder if needed
    let folderId = data.folderId;
    if (folderId === 'misc') {
      folderId = await createFileType({ name: 'Misc', type: 'link' });
    }
    createFileItem({ ...data, folderId, type: 'link' });
    setModal(null);
  }

  async function handleSaveFile(data) {
    let folderId = data.folderId;
    if (folderId === 'misc') {
      folderId = await createFileType({ name: 'Misc', type: 'file' });
    }
    createFileItem({ ...data, folderId, type: 'file' });
    setModal(null);
  }

  function handleSaveFolder(data) {
    createFileType(data);
    setModal(pendingType === 'link' ? 'link' : pendingType === 'file' ? 'file' : null);
    setPendingType(null);
  }

  return (
    <div className="flex-1 flex flex-col overflow-hidden">
      {/* Top bar */}
      <div className="h-11 flex items-center justify-between px-4 border-b border-gray-200 dark:border-gray-800 bg-gray-50/90 dark:bg-gray-950/90 backdrop-blur-sm flex-shrink-0">
        <div className="flex items-center gap-1.5 text-sm text-notion-muted">
          <span className="px-1.5">Fake Notion</span>
          <span className="text-gray-300 dark:text-gray-700">/</span>
          <span className="text-notion-text dark:text-notion-text-dark font-medium px-1.5">Files</span>
        </div>
        <div className="flex items-center gap-2">
          <button onClick={() => setModal('folder')}
                  className="flex items-center gap-1.5 text-sm px-3 py-1 border border-gray-200 dark:border-gray-700 rounded-lg text-notion-muted hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
            <Icon d={IC.plus} size={13} />New folder
          </button>
          <ThemeToggle />
        </div>
      </div>

      <div className="flex-1 overflow-y-auto px-8 py-7 bg-gray-50/60 dark:bg-gray-950/60">
        {/* Header */}
        <div className="flex items-center gap-3 mb-7">
          <span className="text-3xl">📁</span>
          <h1 className="text-3xl font-bold text-notion-text dark:text-notion-text-dark">Files</h1>
        </div>

        {/* Add files zone — 1/4 of container height */}
        <button onClick={() => setModal('add')}
                className="w-full flex flex-col items-center justify-center gap-3 border-2 border-dashed border-gray-300 dark:border-gray-700 rounded-2xl text-notion-muted hover:border-notion-accent hover:text-notion-accent hover:bg-blue-50/20 dark:hover:bg-blue-950/10 transition-all mb-8"
                style={{ height: '25vh', minHeight: 120 }}>
          <div className="w-12 h-12 rounded-2xl bg-gray-100 dark:bg-gray-800 group-hover:bg-blue-100 flex items-center justify-center transition-colors">
            <Icon d={IC.plus} size={22} />
          </div>
          <div className="text-center">
            <p className="font-semibold text-sm">Add files</p>
            <p className="text-xs mt-0.5 opacity-60">Upload files or save links into folders</p>
          </div>
        </button>

        {/* Folder tables */}
        {fileTypes.length === 0 ? (
          <div className="text-center py-12 text-notion-muted text-sm">
            No folders yet — create one with <strong>New folder</strong> or add a file above.
          </div>
        ) : (
          <div className="space-y-5">
            {fileTypes.map(folder => (
              <FolderSection key={folder.id} folder={folder}
                             items={fileItems.filter(i => i.folderId === folder.id)}
                             allFolders={fileTypes}
                             onRelocate={(itemId, newFolderId) => updateFileItem(itemId, { folderId: newFolderId })}
                             onDelete={deleteFileItem} />
            ))}
          </div>
        )}
      </div>

      {/* Modals */}
      {modal === 'add'    && <AddFilesModal onClose={() => setModal(null)} onAddLink={() => setModal('link')} onAddFile={() => setModal('file')} />}
      {modal === 'link'   && <AddLinkModal  linkFolders={linkFolders} onClose={() => setModal(null)} onSave={handleSaveLink}
                                            onCreateFolder={() => { setPendingType('link'); setModal('folder'); }} />}
      {modal === 'file'   && <AddFileModal  fileFolders={fileFolders}  onClose={() => setModal(null)} onSave={handleSaveFile}
                                            onCreateFolder={() => { setPendingType('file'); setModal('folder'); }} />}
      {modal === 'folder' && <CreateFolderModal onClose={() => setModal(null)} onSave={handleSaveFolder} />}
    </div>
  );
}

function ConfigBanner() {
  if (isConfigured()) return null;
  return (
    <div className="mx-6 mt-4 px-4 py-3 bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-800 rounded-xl text-sm text-amber-800 dark:text-amber-300">
      <strong>Local mode</strong> — Firebase not configured. Cards are stored in memory only.
      Edit <code className="bg-amber-100 dark:bg-amber-900/40 px-1 py-0.5 rounded text-xs">FIREBASE_CONFIG</code> in <code className="bg-amber-100 dark:bg-amber-900/40 px-1 py-0.5 rounded text-xs">index.html</code> to persist data.
    </div>
  );
}

// ═════════════════════════════════════════════════════════
//  BOARD PAGE
// ═════════════════════════════════════════════════════════
function BoardPage() {
  const { cards, saveCard, deleteCard, moveCard, setActiveDragId } = useContext(AppContext);
  const [modalState, setModalState] = useState(null);
  const [drag, setDrag] = useState(null);
  const [hoveredColumnId, setHoveredColumnId] = useState(null);
  const snapTimerRef = useRef(null);

  function openNew(status) { setModalState({ defaultStatus: status }); }
  function openEdit(card) { setModalState({ card }); }
  function closeModal() { setModalState(null); }
  function handleSave(cardData) { saveCard(cardData); closeModal(); }
  function handleDelete(cardId) {
    if (confirm("Delete this card?")) { deleteCard(cardId); closeModal(); }
  }

  function handleCardDragStart(info) {
    setActiveDragId(info.card.id);
    setDrag({ ...info, snapping: false });
  }

  // Find which column the cursor is over
  function getColumnAtPoint(x, y) {
    const els = document.elementsFromPoint(x, y);
    for (const el of els) {
      if (el.dataset && el.dataset.columnId) return el.dataset.columnId;
    }
    return null;
  }

  useEffect(() => {
    if (!drag) return;

    function onMove(e) {
      if (drag.snapping) return;
      const colId = getColumnAtPoint(e.clientX, e.clientY);
      setHoveredColumnId(colId);
      setDrag(prev => prev && !prev.snapping ? { ...prev, x: e.clientX, y: e.clientY } : prev);
    }

    function onUp(e) {
      const colId = getColumnAtPoint(e.clientX, e.clientY);
      if (colId && colId !== drag.card.status) {
        moveCard(drag.card.id, colId);
      }

      if (colId) {
        // Valid drop — remove immediately
        setDrag(null);
        setHoveredColumnId(null);
        setActiveDragId(null);
      } else {
        // Invalid drop — snap back then clear
        setDrag(prev => prev ? { ...prev, snapping: true } : null);
        setHoveredColumnId(null);
        snapTimerRef.current = setTimeout(() => {
          setDrag(null);
          setActiveDragId(null);
        }, 280);
      }
    }

    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    return () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
    };
  }, [drag]);

  // Body cursor during drag
  useEffect(() => {
    document.body.classList.toggle('dragging', !!drag && !drag.snapping);
    return () => document.body.classList.remove('dragging');
  }, [drag]);

  // Cleanup snap timer on unmount
  useEffect(() => () => { if (snapTimerRef.current) clearTimeout(snapTimerRef.current); }, []);

  return (
    <div className="flex-1 flex flex-col overflow-hidden">
      <TopBar />
      <ConfigBanner />

      <div className="px-10 pt-8 pb-4">
        <div className="flex items-center gap-3 mb-1">
          <span className="text-3xl">{"\u{1F4CB}"}</span>
          <h1 className="text-3xl font-bold text-notion-text dark:text-notion-text-dark">Board</h1>
        </div>
        <p className="text-sm text-gray-400 dark:text-gray-600 ml-12">Drag cards between columns to update status.</p>
      </div>

      <div className="flex-1 overflow-x-auto px-6 pb-6 bg-gray-50/60 dark:bg-gray-950/60">
        <div className="flex gap-4 min-h-full">
          {COLUMNS.map(col => (
            <Column key={col.id} column={col}
                    cards={cards.filter(c => c.status === col.id)}
                    onEditCard={openEdit}
                    onAddCard={openNew}
                    onCardDragStart={handleCardDragStart}
                    hoveredColumnId={hoveredColumnId} />
          ))}
        </div>
      </div>

      {drag && <DragOverlay drag={drag} />}

      {modalState && (
        <CardModal card={modalState.card} defaultStatus={modalState.defaultStatus}
                   onClose={closeModal} onSave={handleSave} onDelete={handleDelete} />
      )}
    </div>
  );
}

// ═════════════════════════════════════════════════════════
//  APP ROOT
// ═════════════════════════════════════════════════════════
function App() {
  const [darkMode, setDarkMode] = useState(false);
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
  const [cards, setCards] = useState([]);
  const [users, setUsers] = useState([]);
  const [projects, setProjects] = useState([]);
  const [fileTypes, setFileTypes] = useState([]);
  const [fileItems, setFileItems] = useState([]);
  const [view, setView] = useState({ type: 'board' });
  const [activeDragId, setActiveDragId] = useState(null);

  useEffect(() => {
    if (!db) return;
    const unsub1 = db.collection("cards").orderBy("createdAt", "asc")
      .onSnapshot(snap => setCards(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
    const unsub2 = db.collection("users").orderBy("name", "asc")
      .onSnapshot(snap => setUsers(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
    const unsub3 = db.collection("projects").orderBy("createdAt", "asc")
      .onSnapshot(snap => setProjects(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
    const unsub4 = db.collection("fileTypes").orderBy("createdAt", "asc")
      .onSnapshot(snap => setFileTypes(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
    const unsub5 = db.collection("fileItems").orderBy("createdAt", "asc")
      .onSnapshot(snap => setFileItems(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
    return () => { unsub1(); unsub2(); unsub3(); unsub4(); unsub5(); };
  }, []);

  useEffect(() => { document.documentElement.classList.toggle("dark", darkMode); }, [darkMode]);

  const saveCard = useCallback(async (cardData) => {
    if (db) {
      const { id, ...rest } = cardData;
      const existing = cards.find(c => c.id === id);
      if (existing) await db.collection("cards").doc(id).update({ ...rest, updatedAt: new Date().toISOString() });
      else await db.collection("cards").add({ ...rest, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
    } else {
      setCards(prev => {
        const idx = prev.findIndex(c => c.id === cardData.id);
        if (idx !== -1) { const cp = [...prev]; cp[idx] = { ...cp[idx], ...cardData }; return cp; }
        return [...prev, { ...cardData, createdAt: new Date().toISOString() }];
      });
    }
  }, [cards]);

  const deleteCard = useCallback(async (cardId) => {
    if (db) await db.collection("cards").doc(cardId).delete();
    else setCards(prev => prev.filter(c => c.id !== cardId));
  }, []);

  const moveCard = useCallback(async (cardId, newStatus) => {
    if (db) await db.collection("cards").doc(cardId).update({ status: newStatus });
    else setCards(prev => prev.map(c => c.id === cardId ? { ...c, status: newStatus } : c));
  }, []);

  const addUser = useCallback(async (name) => {
    const user = { name, createdAt: new Date().toISOString() };
    if (db) await db.collection("users").add(user);
    else setUsers(prev => [...prev, { id: genId(), ...user }]);
  }, []);

  const removeUser = useCallback(async (userId) => {
    if (db) await db.collection("users").doc(userId).delete();
    else setUsers(prev => prev.filter(u => u.id !== userId));
  }, []);

  // ── File CRUD ──────────────────────────────────────────
  const createFileType = useCallback(async (data) => {
    const payload = { ...data, createdAt: new Date().toISOString() };
    if (db) {
      const ref = await db.collection("fileTypes").add({ ...payload, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
      return ref.id;
    } else {
      const id = genId();
      setFileTypes(prev => [...prev, { id, ...payload }]);
      return id;
    }
  }, []);

  const createFileItem = useCallback(async (data) => {
    const payload = { ...data, createdAt: new Date().toISOString() };
    if (db) {
      await db.collection("fileItems").add({ ...payload, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
    } else {
      setFileItems(prev => [...prev, { id: genId(), ...payload }]);
    }
  }, []);

  const updateFileItem = useCallback(async (id, updates) => {
    if (db) await db.collection("fileItems").doc(id).update(updates);
    else setFileItems(prev => prev.map(i => i.id === id ? { ...i, ...updates } : i));
  }, []);

  const deleteFileItem = useCallback(async (id) => {
    if (db) await db.collection("fileItems").doc(id).delete();
    else setFileItems(prev => prev.filter(i => i.id !== id));
  }, []);

  const createProject = useCallback(async (emoji) => {
    const data = { title: "Untitled", emoji, content: "", createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
    if (db) {
      const ref = await db.collection("projects").add({ ...data, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
      setView({ type: 'project', projectId: ref.id });
    } else {
      const id = genId();
      setProjects(prev => [...prev, { id, ...data }]);
      setView({ type: 'project', projectId: id });
    }
  }, []);

  const updateProject = useCallback(async (projectId, updates) => {
    if (db) await db.collection("projects").doc(projectId).update(updates);
    else setProjects(prev => prev.map(p => p.id === projectId ? { ...p, ...updates } : p));
  }, []);

  const deleteProject = useCallback(async (projectId) => {
    if (db) await db.collection("projects").doc(projectId).delete();
    else setProjects(prev => prev.filter(p => p.id !== projectId));
  }, []);

  const ctx = { cards, users, projects, fileTypes, fileItems, view, setView, darkMode, setDarkMode, saveCard, deleteCard, moveCard, addUser, removeUser, createProject, updateProject, deleteProject, createFileType, createFileItem, updateFileItem, deleteFileItem, activeDragId, setActiveDragId };

  return (
    <AppContext.Provider value={ctx}>
      <div className="h-screen flex bg-white dark:bg-notion-bg-dark font-sans">
        <Sidebar collapsed={sidebarCollapsed} onToggle={() => setSidebarCollapsed(!sidebarCollapsed)} />
        {view.type === 'board'    && <BoardPage />}
        {view.type === 'projects' && <ProjectsOverview />}
        {view.type === 'project'  && <ProjectEditor projectId={view.projectId} />}
        {view.type === 'files'    && <FilesView />}
      </div>
    </AppContext.Provider>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
